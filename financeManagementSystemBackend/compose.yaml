name: finpilot-local

services:
  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: finpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finpilot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-finpilot}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
